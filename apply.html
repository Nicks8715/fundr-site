<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply for Finance | fundr</title>
<meta name="description" content="Apply for business vehicle, truck or equipment finance through fundr. 15+ NZ lenders, approvals in 24 hours. No credit impact to enquire.">
<link rel="canonical" href="https://www.fundr.co.nz/apply">
<link rel="stylesheet" href="/shared.css">
</head>
<body>
<div id="header-placeholder"></div>

<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;background:#f7f5f0;padding:60px 24px">
  <div style="max-width:560px;width:100%;text-align:center">
    <p style="font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#e8650a;font-weight:600;margin-bottom:12px">Get Started</p>
    <h1 style="font-family:'Instrument Serif',Georgia,serif;font-size:clamp(2rem,4vw,2.8rem);color:#111110;line-height:1.08;margin-bottom:16px">Apply for Finance</h1>
    <p style="font-size:.95rem;color:#5a5348;line-height:1.75;margin-bottom:32px;font-weight:300">One application, 15+ NZ lenders, decisions within 24 hours. No credit impact to enquire.</p>
    <button class="open-popup" style="background:#e8650a;color:#fff;border:none;padding:16px 36px;font-family:'Geist',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:background .2s">GET MY FINANCE OPTIONS →</button>
    <p style="margin-top:16px;font-size:.8rem;color:#a09890;font-weight:300">No credit check at this stage. Nick will be in touch within 24 hours.</p>
  </div>
</section>

<div id="footer-placeholder"></div>
<div id="popup-placeholder"></div>
<script src="/shared.js"></script>
<script>(function(){function lc(id,p){fetch(p).then(function(r){return r.text()}).then(function(h){var e=document.getElementById(id);if(e)e.outerHTML=h}).catch(function(){})}lc("header-placeholder","/_components/header.html");lc("footer-placeholder","/_components/footer.html");lc("popup-placeholder","/_components/popup.html")})();</script>
</body>
</html>
